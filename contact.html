<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact — TechSearch &amp; Associates</title>
  <meta name="description" content="Get in touch with TechSearch & Associates by phone, email, or LinkedIn.">
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="home.html" class="brand">
        <img class="brand-mark" src="imgs/mini-logo.png" alt="" onerror="this.style.display='none'">
        <span class="brand-word">TechSearch <em>&amp;</em> Associates</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="services.html"><span class="idx">01</span>Services</a>
        <a href="industries.html"><span class="idx">02</span>Industries</a>
        <a href="contact.html" aria-current="page"><span class="idx">03</span>Contact</a>
      </nav>
      <button class="nav-toggle" id="navToggle" aria-expanded="false" aria-controls="mobileNav">
        <span></span><span></span><span></span>
        <span class="sr-only">Menu</span>
      </button>
    </div>
    <nav class="mobile-nav" id="mobileNav" aria-label="Mobile">
      <a href="services.html">Services</a>
      <a href="industries.html">Industries</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <section class="page-hero contact">
      <div class="wrap">
        <p class="eyebrow">Contact</p>
        <h1>Reach out.</h1>
      </div>
    </section>

    <section class="contact-section">
      <div class="wrap">
        <div class="contact-manifest">

          <a class="contact-row" href="tel:+14166444949">
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
            </span>
            <span class="contact-label">Phone</span>
            <span class="contact-value">416-644-4949</span>
          </a>

          <a class="contact-row" href="mailto:aaron@tech-search.ca">
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="m2 7 10 6 10-6"/>
              </svg>
            </span>
            <span class="contact-label">Email</span>
            <span class="contact-value">aaron@tech-search.ca</span>
          </a>

          <a class="contact-row" href="https://www.linkedin.com/company/techsearchassociates" target="_blank" rel="noopener">
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
                <rect x="2" y="9" width="4" height="12"/>
                <circle cx="4" cy="4" r="2"/>
              </svg>
            </span>
            <span class="contact-label">LinkedIn</span>
            <span class="contact-value">techsearchassociates</span>
          </a>

        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <span>&copy; <span id="year"></span> TechSearch &amp; Associates</span>
      <span>Toronto, Canada</span>
    </div>
  </footer>

  <script>
    (function () {
      var toggle = document.getElementById('navToggle');
      var menu = document.getElementById('mobileNav');
      if (toggle && menu) {
        toggle.addEventListener('click', function () {
          var open = toggle.getAttribute('aria-expanded') === 'true';
          toggle.setAttribute('aria-expanded', String(!open));
          menu.classList.toggle('is-open', !open);
        });
        menu.querySelectorAll('a').forEach(function (a) {
          a.addEventListener('click', function () {
            toggle.setAttribute('aria-expanded', 'false');
            menu.classList.remove('is-open');
          });
        });
      }
      var yearEl = document.getElementById('year');
      if (yearEl) { yearEl.textContent = new Date().getFullYear(); }
    })();
  </script>
</body>
</html>
